alias: Steam Deck - Game Closed
description: >
  Posts game stop event to the queue processor service and clears session
  helpers and cover art. For improperly closed sessions (standby/offline), reads
  the session start_time from the MQTT playtime queue sensor to calculate
  accurate session duration excluding standby periods.
triggers:
  - entity_id: sensor.steam_deck_active_game_display
    trigger: state
conditions:
  - condition: template
    value_template: >
      {% set sensor = states.sensor.steam_deck_game_playtime %} {{ sensor is not
      none and sensor.state != 'unavailable' and
      state_attr('sensor.steam_deck_game_playtime', 'games') is not none }}
  - condition: state
    entity_id: input_boolean.steam_deck_sessie_actief
    state: "on"
  - condition: template
    value_template: >
      {% set ignore = ['unknown', 'unavailable', 'none', 'idle', 'offline', 'not
      playing', 'no game opened'] %} {{ trigger.to_state.state | lower | trim in
      ignore }}
actions:
  - variables:
      saved_game_name: "{{ states('input_text.steam_deck_huidige_game') | trim }}"
      stop_time: "{{ now().isoformat() }}"
      properly_closed: >
        {{ trigger.to_state.state | lower | trim not in ['offline',
        'unavailable', 'unknown'] }}
      queue_sessions: >
        {{ state_attr('sensor.steam_deck_playtime_queue', 'active_sessions') or
        [] }}
      open_session: >
        {% set sessions = state_attr('sensor.steam_deck_playtime_queue',
        'active_sessions') or [] %} {% set match = sessions |
        selectattr('game_state', 'eq', 'opened')
                                | selectattr('name', 'eq', saved_game_name)
                                | list %}
        {{ match[0] if match | length > 0 else {} }}
      session_start_time: >
        {% set sessions = state_attr('sensor.steam_deck_playtime_queue',
        'active_sessions') or [] %} {% set match = sessions |
        selectattr('game_state', 'eq', 'opened')
                                | selectattr('name', 'eq', saved_game_name)
                                | list %}
        {% if match | length > 0 %}
          {{ match[0].start_time | int | timestamp_custom('%Y-%m-%dT%H:%M:%S') }}
        {% else %}
          {{ stop_time }}
        {% endif %}
  - if:
      - condition: template
        value_template: "{{ not properly_closed }}"
    then:
      - action: shell_command.post_game_stop
        data:
          game_name: "{{ saved_game_name }}"
          stop_time: "{{ stop_time }}"
          start_time: "{{ session_start_time }}"
          game_type: "{{ states('input_text.steam_pending_game_type') }}"
          appid: "{{ states('input_text.steam_pending_appid') }}"
          properly_closed: "{{ properly_closed | lower }}"
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.steam_deck_sessie_actief
  - action: input_text.set_value
    target:
      entity_id: input_text.steam_deck_huidige_game
    data:
      value: No game
  - action: input_text.set_value
    target:
      entity_id: input_text.steam_deck_game_cover_url
    data:
      value: none
  - action: input_text.set_value
    target:
      entity_id: input_text.steam_pending_image_type
    data:
      value: none
  - action: homeassistant.update_entity
    target:
      entity_id: image.steamdeck_active_game_cover
mode: queued
max: 10

