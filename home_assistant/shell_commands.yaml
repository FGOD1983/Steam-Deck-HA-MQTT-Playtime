# Steam Deck
  
  fetch_igdb_cover: >-
    curl -s --max-time 5 -X POST 'https://api.igdb.com/v4/games'
    -H 'Client-ID: {{ client_id }}'
    -H 'Authorization: Bearer {{ bearer_token }}'
    -H 'Content-Type: text/plain'
    -d 'search "{{ game_name }}"; fields name,cover.url; limit 1;'

  refresh_igdb_token: >-
    curl -s -X POST 'https://id.twitch.tv/oauth2/token'
    -d 'client_id={{ client_id }}'
    -d 'client_secret={{ client_secret }}'
    -d 'grant_type=client_credentials'
    
  check_steam_image: "curl -s -o /dev/null -w \"%{http_code}\" -A \"Mozilla/5.0\" \"{{ url }}\""

  # Post a game start event to the queue processor service
  post_game_start: >-
    curl -s -X POST http://127.0.0.1:8098/game_start
    -H "Content-Type: application/json"
    -d "{\"game_name\": \"{{ game_name }}\", \"appid\": \"{{ appid }}\", \"game_type\": \"{{ game_type }}\", \"start_time\": \"{{ start_time }}\"}"

  # Post a game stop event to the queue processor service
  post_game_stop: >-
    curl -s -X POST http://127.0.0.1:8098/game_stop
    -H "Content-Type: application/json"
    -d "{\"game_name\": \"{{ game_name }}\", \"stop_time\": \"{{ stop_time }}\", \"properly_closed\": {{ properly_closed | lower }}}"

  # Start the queue processor service in the background
  start_queue_processor: "nohup python3 /config/scripts/steam_queue_processor.py > /config/scripts/steam_queue_processor.log 2>&1 &"

  # Check if the queue processor service is running — returns 200 if up
  check_queue_processor: "curl -s -o /dev/null -w \"%{http_code}\" http://127.0.0.1:8098/status"